name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  # Prove the toolkit runs on a bare standard library (no optional deps),
  # across supported Python versions and on Windows for one version.
  stdlib:
    name: stdlib-only (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (no optional dependencies)
        run: python -m unittest discover -s skills/seo-scan/tests -v

  # Prove it also works with the optional parsing/rendering extras installed.
  with-extras:
    name: with-extras (py3.12, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install optional extras
        run: pip install -r skills/seo-scan/requirements.txt
      - name: Run tests (with extras)
        run: python -m unittest discover -s skills/seo-scan/tests -v
